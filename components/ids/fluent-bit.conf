[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# =================================================================
# 1. FONTE: SNORT (IDS di Rete)
# =================================================================
[INPUT]
    Name              tail
    Tag               snort.alerts
    Path              /var/log/snort/alert_json.txt
    Parser            json
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

# =================================================================
# 2. FONTE: MONGODB (Audit & Persistenza)
# =================================================================
[INPUT]
    Name              tail
    Tag               mongo.audit
    Path              /var/log/mongodb/mongod.log
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

# =================================================================
# 3. FONTE: ENVOY (Policy Enforcement Point)
# =================================================================
[INPUT]
    Name              tail
    Tag               envoy.access
    Path              /var/log/envoy/access.log
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

# =================================================================
# 4. FONTE: OPA (Policy Decision Point)
# =================================================================
[INPUT]
    Name              tail
    Tag               opa.decisions
    Path              /var/log/opa/decision.log
    Parser            json
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

# =================================================================
# 5. FONTE: NFTABLES (Firewall del Nucleo Ospedaliero)
# =================================================================
[INPUT]
    Name              tail
    Tag               nftables.kernel
    Path              /var/log/nftables/firewall.log
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

# =================================================================
# DESTINAZIONE UNICA: SPLUNK SIEM (via HTTP Event Collector)
# =================================================================
[OUTPUT]
    Name              splunk
    Match             *
    Host              splunk-siem
    Port              8088
    Splunk_Token      11111111-1111-1111-1111-111111111111
    TLS               Off
    TLS.Verify        Off
    Message_Key       log