# =============================================================
# Squid — Application-Level Firewall (L7) in Reverse Proxy mode
# Chain position: Firewall → [SQUID] → PEP → API Server
# =============================================================

# --- Reverse proxy mode: accept traffic, forward to PEP ---
http_port 3128 accel defaultsite=pep vhost

cache_peer pep parent 80 0 no-query originserver name=upstream_pep

# --- ACL definitions ---
acl localnet src 172.20.0.0/24
acl localnet src 172.21.0.0/24

acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 3128

# L7 URL-based filtering (works on URL path in reverse proxy mode)
acl SqlInjection urlpath_regex -i OR%201%3D1 OR\+1=1 1%3D1 union%20select
acl BadFiles     urlpath_regex -i \.exe$ \.torrent$ \.sh$
acl BadDomains   dstdomain .evil-malware-domain.com .suspicious-site.net .malware-c2.com

# --- ZERO TRUST L7 RULES ---
http_access deny SqlInjection
http_access deny BadFiles
http_access deny BadDomains
http_access allow localnet
http_access deny all

# Route ALL allowed traffic to PEP upstream
cache_peer_access upstream_pep allow all

# --- Logging ---
# Log to a file so squid process doesn't fail on /dev/stdout permissions
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
