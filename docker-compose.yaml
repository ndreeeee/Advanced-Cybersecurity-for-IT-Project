
networks:
  frontend-net:      # Rete pubblica (Client -> Firewall)
    driver: bridge
  backend-net:       # Rete privata per i dati (Firewall -> Envoy -> Mongo)
    driver: bridge
  control-plane-net: # Rete di gestione (OPA, Splunk, Fluent Bit)
    driver: bridge

services:

  # 1. IL FIREWALL L3/L4 (NFTables)
  nftables-firewall:
    build: 
      context: ./components/firewall
    container_name: zta-firewall
    cap_add:
      - NET_ADMIN
    volumes:
      - nftables_logs:/var/log/nftables
    depends_on:
      - envoy-pep # Fondamentale per risolvere l'IP di Envoy all'avvio
    networks:
      - frontend-net
      - backend-net

  # 2. LA RISORSA (MongoDB)
  mongodb-resource:
    image: mongo:latest
    container_name: zta-mongodb
    volumes:
      - ./components/dbms/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - mongo_logs:/var/log/mongodb
    command: --logpath /var/log/mongodb/mongod.log --logappend --quiet
    networks:
      - backend-net

  # 3. IL PEP E PROXY (Envoy)
  envoy-pep:
    image: envoyproxy/envoy:v1.30-latest
    container_name: zta-envoy
    user: root  # necessario per scrivere sul volume Docker (permission fix)
    environment:
      - ENVOY_UID=0  # Disabilita il drop dei privilegi (su-exec) in /docker-entrypoint.sh
    volumes:
      - ./components/pep/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./certs:/etc/certs:ro
      - envoy_logs:/var/log/envoy
    command: -c /etc/envoy/envoy.yaml --log-path /var/log/envoy/envoy.log
    depends_on:
      - mongodb-resource
      - opa-pdp
    networks:
      - frontend-net      # Alice lo raggiunge direttamente per l'mTLS (porta 27017)
      - backend-net
      - control-plane-net

  # 4. L'IDS PASSIVO (Snort) — condivide il namespace di rete di Envoy
  snort-ids:
    build: 
      context: ./components/ids
    container_name: zta-snort
    cap_add:
      - NET_ADMIN
    volumes:
      - snort_logs:/var/log/snort
    depends_on:
      - envoy-pep  # FONDAMENTALE: il namespace di rete di Envoy deve esistere prima
    network_mode: "service:envoy-pep"

  # 5. IL DECISION MAKER (OPA)
  opa-pdp:
    build:
      context: ./components/pdp
    container_name: zta-opa
    volumes:
      - ./components/pdp/rules.rego:/policy/rules.rego:ro
      - ./components/pdp/opa-config.yaml:/etc/opa/config.yaml:ro
      - opa_logs:/var/log/opa
    command:
      - "exec /opa run --server --log-level=debug --log-format=json --config-file=/etc/opa/config.yaml /policy/rules.rego > /var/log/opa/decision.log 2>&1"
    networks:
      - control-plane-net

  # 6. IL SIEM (Splunk)
  splunk-siem:
    image: splunk/splunk:latest
    container_name: zta-splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
      - SPLUNK_HEC_ENABLE=true
      - SPLUNK_HEC_TOKEN=11111111-1111-1111-1111-111111111111
    ports:
      - "8000:8000"
      - "8088:8088"
      - "8089:8089"
    networks:
      - control-plane-net

  # 7. IL LOG SHIPPER (Fluent Bit)
  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: zta-fluent-bit
    volumes:
      - ./components/ids/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - nftables_logs:/var/log/nftables:ro
      - mongo_logs:/var/log/mongodb:ro
      - envoy_logs:/var/log/envoy:ro
      - snort_logs:/var/log/snort:ro
      - opa_logs:/var/log/opa:ro
    depends_on:
      - splunk-siem
    networks:
      - control-plane-net

  # 8. IL CLIENT DI TEST (Alice)
  client-alice:
    build: 
      context: ./components/clients
    container_name: zta-client-alice
    environment:
      - CLIENT_NAME=alice
      - CLIENT_ROLE=medico
    volumes:
      - ./certs:/etc/certs:ro  # simulator.py legge da /etc/certs/
    depends_on:
      - envoy-pep
    networks:
      - frontend-net # Alice è confinata qui, parla con Envoy direttamente via mTLS

  # 9. IL CLIENT ATTACCANTE (Bob)
  client-bob:
    build:
      context: ./components/clients
    container_name: zta-client-bob
    environment:
      - CLIENT_NAME=bob
      - CLIENT_ROLE=suspect
    volumes:
      - ./certs:/etc/certs:ro  # Bob ha un certificato valido ma senza TPM OID
    depends_on:
      - envoy-pep
    networks:
      - frontend-net # Bob è sulla stessa rete di Alice, ma OPA lo bloccherà

volumes:
  nftables_logs:
  mongo_logs:
  envoy_logs:
  snort_logs:
  opa_logs: