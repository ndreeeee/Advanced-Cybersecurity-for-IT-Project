version: '3.8'

networks:
  data-plane:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  
  control-plane:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

services:
  # ==========================================
  # CONTROL PLANE SERVICES
  # ==========================================
  dbms:
    image: postgres:16
    container_name: zta-dbms
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./components/dbms/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - control-plane
    ports:
      - "5432:5432"

  splunk:
    image: splunk/splunk:latest
    container_name: zta-splunk
    environment:
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
    ports:
      - "8000:8000"       # Web UI
      - "8089:8089"       # REST API (per il PDP)
      - "1514:1514/udp"   # Syslog receiver (da Firewall, Squid, Snort)
    networks:
      - control-plane

  pdp:
    build: 
      context: ./components/pdp
    container_name: zta-pdp
    depends_on:
      - splunk
      - dbms
    environment:
      SPLUNK_HOST: splunk
      SPLUNK_PASS: ${SPLUNK_PASSWORD}
      DB_HOST: dbms
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    networks:
      - control-plane

  # ==========================================
  # DATA PLANE SERVICES
  # ==========================================
  api-server:
    build:
      context: ./components/api-server
    container_name: zta-resource
    networks:
      data-plane:
        ipv4_address: 172.20.0.100

  pep:
    build:
      context: ./components/pep
    container_name: zta-pep
    depends_on:
      - api-server
      - dbms
    environment:
      DB_HOST: dbms
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    networks:
      data-plane:
        ipv4_address: 172.20.0.99
      control-plane:
        ipv4_address: 172.21.0.99

  ids:
    build:
      context: ./components/ids
    container_name: zta-ids
    cap_add:
      - NET_ADMIN
    depends_on:
      - splunk
    networks:
      data-plane:
        ipv4_address: 172.20.0.98
      control-plane:
        ipv4_address: 172.21.0.98

  proxy:
    build:
      context: ./components/proxy
    container_name: zta-proxy
    depends_on:
      - pep
      - splunk
    networks:
      data-plane:
        ipv4_address: 172.20.0.97
      control-plane:
        ipv4_address: 172.21.0.97

  firewall:
    build:
      context: ./components/firewall
    container_name: zta-firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - proxy
      - splunk
    networks:
      data-plane:
        ipv4_address: 172.20.0.96
      control-plane:
        ipv4_address: 172.21.0.96

  # ==========================================
  # CLIENTS (SIMULATORS)
  # ==========================================
  client-alice:
    build:
      context: ./components/clients
    container_name: zta-client-alice
    depends_on:
      - firewall
    environment:
      CLIENT_NAME: employee-alice
      CLIENT_ROLE: legit
      CLIENT_IP: 172.20.0.10
    networks:
      data-plane:
        ipv4_address: 172.20.0.10

  client-kiosk:
    build:
      context: ./components/clients
    container_name: zta-client-kiosk
    depends_on:
      - firewall
    environment:
      CLIENT_NAME: branch-kiosk
      CLIENT_ROLE: kiosk
      CLIENT_IP: 172.20.0.11
    networks:
      data-plane:
        ipv4_address: 172.20.0.11
  
  client-bob:
    build:
      context: ./components/clients
    container_name: zta-client-bob
    depends_on:
      - firewall
    environment:
      CLIENT_NAME: employee-bob
      CLIENT_ROLE: suspect
      CLIENT_IP: 172.20.0.12
    networks:
      data-plane:
        ipv4_address: 172.20.0.12
