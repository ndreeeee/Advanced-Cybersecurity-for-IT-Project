version: '3.8'

networks:
  frontend-net: # Rete pubblica
    driver: bridge
  backend-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
  control-plane-net: # Rete di gestione (OPA, Splunk)
    driver: bridge

services:

  # 1. IL FIREWALL L3/L4 (NFTables)
  nftables-firewall:
    build: 
      context: ./components/firewall
    container_name: zta-firewall
    privileged: true
    cap_add:
      - NET_ADMIN
    networks:
      - frontend-net
      - backend-net
      - control-plane-net
    depends_on:
      - envoy-pep

  # 2. LA RISORSA (MongoDB)
  mongodb-resource:
    image: mongo:latest
    container_name: zta-mongodb
    volumes:
      - ./components/dbms/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - backend-net # Isolato, nessuna porta esposta all'host!

  # 3. IL PEP E PROXY (Envoy)
  envoy-pep:
    image: envoyproxy/envoy:v1.30-latest
    container_name: zta-envoy
    volumes:
      - ./components/pep/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./components/pep/lua_script.lua:/etc/envoy/lua_script.lua:ro
      - ./certs:/etc/certs:ro # I certificati per l'mTLS
    depends_on:
      - mongodb-resource
      - opa-pdp
    networks:
      backend-net:
        ipv4_address: 10.10.10.100
        aliases:
          - envoy-pep
          - zta-envoy
      control-plane-net:
        aliases:
          - envoy-pep

  # 4. L'IDS PASSIVO (Snort)
  snort-ids:
    build: 
      context: ./components/ids
    container_name: zta-snort
    cap_add:
      - NET_ADMIN
    # Si attacca alla scheda di rete di Envoy per ispezionarne il traffico
    network_mode: "service:envoy-pep"

  # 5. IL DECISION MAKER (OPA)
  opa-pdp:
    image: openpolicyagent/opa:latest-envoy
    container_name: zta-opa
    command:
      - "run"
      - "--server"
      - "--config-file=/policies/opa-config.yaml"
      - "--log-level=debug"
      - "/policies"
    volumes:
      - ./components/pdp:/policies:ro
    networks:
      - control-plane-net

  # 6. IL SIEM (Splunk)
  splunk-siem:
    image: splunk/splunk:latest
    container_name: zta-splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
    ports:
      - "8000:8000" # Web UI
      - "8088:8088" # HEC (HTTP Event Collector per i log)
      - "8089:8089" # API REST
    volumes:
      - ./components/splunk:/opt/splunk/etc/apps/zta/local
    networks:
      control-plane-net:
        aliases:
          - splunk
          - splunk-siem

  # 7. IL CLIENT DI TEST (Alice - Legittimo con TPM)
  client-alice:
    build: 
      context: ./components/clients
    container_name: zta-client-alice
    environment:
      - CLIENT_NAME=employee-alice
      - CLIENT_ROLE=legit
    volumes:
      - ./certs:/etc/certs:ro
    networks:
      - frontend-net
    depends_on:
      - envoy-pep

  # 8. IL CLIENT DI TEST (Bob - Sospetto senza TPM)
  client-bob:
    build: 
      context: ./components/clients
    container_name: zta-client-bob
    environment:
      - CLIENT_NAME=employee-bob
      - CLIENT_ROLE=suspect
    volumes:
      - ./certs:/etc/certs:ro
    networks:
      - frontend-net
    depends_on:
      - envoy-pep

  # 9. IL TRUST SCORE ENGINE (Python PDP Daemon + REST API)
  pdp-trust-engine:
    image: python:3.9-slim
    container_name: zta-pdp
    working_dir: /app
    volumes:
      - ./components/pdp:/app
    environment:
      - DB_HOST=mongodb-resource
      - DB_USER=zta_service_user
      - DB_PASS=ZtaSuperSecurePassword2026!
      - DB_NAME=hospital_db
      - SPLUNK_USER=admin
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
    ports:
      - "5000:5000"
    command: >
      bash -c "
      pip install pymongo httpx &&
      python pdp.py
      "
    networks:
      - backend-net
      - control-plane-net
    depends_on:
      - mongodb-resource
      - splunk-siem