<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 560" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap');
      
      .bg { fill: #0a0e17; }
      .zone-bg { fill: #161b22; stroke-width: 1.5px; rx: 8px; }
      .zone-title { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
      
      /* Node Styles */
      .node-rect { stroke-width: 1.5px; rx: 5px; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2)); }
      .node-title { font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; fill: #e6edf3; }
      .node-subtitle { font-family: 'Outfit', sans-serif; font-size: 9px; fill: #8b949e; }
      
      /* Paths & Arrows */
      .flow-line { fill: none; stroke-width: 1.5px; stroke-linecap: round; stroke-linejoin: round; }
      .telemetry-line { fill: none; stroke-width: 1.2px; stroke-dasharray: 4 3; stroke-linecap: round; }
      .arrow-head { fill: context-stroke; }
      
      .lbl { font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 600; text-anchor: middle; }
    </style>
    
    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" class="arrow-head" />
    </marker>
    <marker id="arrow-tel" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" class="arrow-head" />
    </marker>

    <!-- Icons -->
    <g id="icon-laptop" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="11" rx="2" />
      <path d="M1 19h22M5 19v1M19 19v1" />
    </g>
    
    <g id="icon-firewall" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="2" />
      <path d="M2 9h20M2 16h20M7 2v7M17 2v7M12 9v7M4 16v6M14 16v6" />
    </g>

    <g id="icon-proxy" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" />
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
    </g>

    <g id="icon-api" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 18 22 12 16 6" />
      <polyline points="8 6 2 12 8 18" />
      <line x1="14" y1="4" x2="10" y2="20" />
    </g>

    <g id="icon-database" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="5" rx="9" ry="3" />
      <path d="M3 5v6c0 1.66 4 3 9 3s9-1.34 9-3V5" />
      <path d="M3 11v6c0 1.66 4 3 9 3s9-1.34 9-3v-6" />
    </g>

    <g id="icon-snort" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" />
      <path d="M12 8v4l3 3" />
      <circle cx="12" cy="12" r="3" />
    </g>

    <g id="icon-log" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
      <polyline points="14 2 14 8 20 8" />
      <line x1="16" y1="13" x2="8" y2="13" />
      <line x1="16" y1="17" x2="8" y2="17" />
      <polyline points="10 9 9 9 8 9" />
    </g>

    <g id="icon-splunk" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21.21 15.89A10 10 0 1 1 8 2.83" />
      <path d="M22 12A10 10 0 0 0 12 2v10z" />
    </g>

    <g id="icon-opa" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
    </g>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" stroke="#30363d" stroke-width="1" />

  <!-- ZONES -->
  
  <!-- 1. Rete Esterna (Smart Working) -->
  <g>
    <rect x="25" y="30" width="180" height="120" class="zone-bg" stroke="#e05a47" fill-opacity="0.05" />
    <text x="35" y="48" class="zone-title" fill="#e05a47">RETE ESTERNA</text>
    
    <!-- Charlie Node -->
    <g transform="translate(55, 65)">
      <rect width="120" height="65" class="node-rect" stroke="#e05a47" fill="#161b22" />
      <g transform="translate(10, 15)" class="node-icon" color="#e05a47">
        <use href="#icon-laptop" />
      </g>
      <text x="42" y="32" class="node-title">Charlie</text>
      <text x="42" y="45" class="node-subtitle">smart working</text>
    </g>
  </g>

  <!-- 2. Rete Interna / DMZ -->
  <g>
    <rect x="25" y="170" width="370" height="230" class="zone-bg" stroke="#3498db" fill-opacity="0.05" />
    <text x="35" y="188" class="zone-title" fill="#3498db">RETE INTERNA / DMZ</text>
    
    <!-- Alice Node -->
    <g transform="translate(45, 210)">
      <rect width="130" height="65" class="node-rect" stroke="#3498db" fill="#161b22" />
      <g transform="translate(10, 15)" color="#3498db">
        <use href="#icon-laptop" />
      </g>
      <text x="42" y="32" class="node-title">Alice</text>
      <text x="42" y="45" class="node-subtitle">workstation interna</text>
    </g>

    <!-- Bob Node -->
    <g transform="translate(45, 310)">
      <rect width="130" height="65" class="node-rect" stroke="#3498db" fill="#161b22" />
      <g transform="translate(10, 15)" color="#3498db">
        <use href="#icon-laptop" />
      </g>
      <text x="42" y="32" class="node-title">Bob</text>
      <text x="42" y="45" class="node-subtitle">personale BYOD</text>
    </g>

    <!-- Firewall Node -->
    <g transform="translate(230, 255)">
      <rect width="145" height="75" class="node-rect" stroke="#e05a47" fill="#161b22" />
      <g transform="translate(12, 18)" color="#e05a47">
        <use href="#icon-firewall" />
      </g>
      <text x="45" y="36" class="node-title">Firewall</text>
      <text x="45" y="49" class="node-subtitle">nftables L4 security</text>
    </g>
  </g>

  <!-- 3. Envoy PEP (Choke point) -->
  <g transform="translate(455, 200)">
    <rect width="150" height="85" class="node-rect" stroke="#e05a47" fill="#e05a47" fill-opacity="0.1" />
    <g transform="translate(15, 22)" color="#e05a47">
      <use href="#icon-proxy" />
    </g>
    <text x="50" y="38" class="node-title" fill="#ff7b72">Envoy Proxy</text>
    <text x="50" y="52" class="node-title" fill="#ff7b72" font-size="10">PEP Gateway</text>
    <text x="50" y="65" class="node-subtitle" fill="#8b949e">mTLS termination</text>
  </g>

  <!-- 4. Risorse Protette (Secure Core) -->
  <g>
    <rect x="660" y="30" width="265" height="370" class="zone-bg" stroke="#2ecc71" fill-opacity="0.05" />
    <text x="670" y="48" class="zone-title" fill="#2ecc71">RISORSE PROTETTE (SECURE CORE)</text>
    
    <!-- Web API Node -->
    <g transform="translate(710, 80)">
      <rect width="165" height="75" class="node-rect" stroke="#2ecc71" fill="#161b22" />
      <g transform="translate(15, 18)" color="#2ecc71">
        <use href="#icon-api" />
      </g>
      <text x="48" y="35" class="node-title">Web API</text>
      <text x="48" y="48" class="node-subtitle">Flask application server</text>
      <text x="48" y="59" class="node-subtitle" fill="#58a6ff">porta: 8000 / 8443</text>
    </g>

    <!-- MongoDB Node -->
    <g transform="translate(710, 275)">
      <rect width="165" height="75" class="node-rect" stroke="#2ecc71" fill="#161b22" />
      <g transform="translate(15, 18)" color="#2ecc71">
        <use href="#icon-database" />
      </g>
      <text x="48" y="35" class="node-title">MongoDB</text>
      <text x="48" y="48" class="node-subtitle">database clinico pazienti</text>
      <text x="48" y="59" class="node-subtitle" fill="#58a6ff">porta: 27017</text>
    </g>
  </g>

  <!-- 5. Piano di Controllo (Trust Zone) -->
  <g>
    <rect x="25" y="420" width="900" height="110" class="zone-bg" stroke="#8b949e" fill-opacity="0.05" />
    <text x="35" y="438" class="zone-title" fill="#8b949e">PIANO DI CONTROLLO (TRUST ZONE)</text>
    
    <!-- Snort Node -->
    <g transform="translate(55, 450)">
      <rect width="140" height="65" class="node-rect" stroke="#8b949e" fill="#161b22" />
      <g transform="translate(10, 15)" color="#8b949e">
        <use href="#icon-snort" />
      </g>
      <text x="42" y="30" class="node-title">Snort</text>
      <text x="42" y="43" class="node-subtitle">NIDS packet inspector</text>
    </g>

    <!-- Fluent-Bit Node -->
    <g transform="translate(285, 450)">
      <rect width="140" height="65" class="node-rect" stroke="#8b949e" fill="#161b22" />
      <g transform="translate(10, 15)" color="#8b949e">
        <use href="#icon-log" />
      </g>
      <text x="42" y="30" class="node-title">Fluent-Bit</text>
      <text x="42" y="43" class="node-subtitle">log shipper &amp; aggregator</text>
    </g>

    <!-- Splunk Node -->
    <g transform="translate(525, 450)">
      <rect width="140" height="65" class="node-rect" stroke="#8b949e" fill="#161b22" />
      <g transform="translate(10, 15)" color="#8b949e">
        <use href="#icon-splunk" />
      </g>
      <text x="42" y="30" class="node-title">Splunk</text>
      <text x="42" y="43" class="node-subtitle">SIEM analytics + MLTK</text>
    </g>

    <!-- OPA Node -->
    <g transform="translate(755, 450)">
      <rect width="140" height="65" class="node-rect" stroke="#8b949e" fill="#161b22" />
      <g transform="translate(10, 15)" color="#8b949e">
        <use href="#icon-opa" />
      </g>
      <text x="42" y="30" class="node-title">OPA</text>
      <text x="42" y="43" class="node-subtitle">policy engine PDP</text>
    </g>
  </g>

  <!-- CONNECTIONS & LABELS -->
  <g>
    <!-- Charlie -> Firewall -->
    <path d="M 175,97 L 260,97 L 260,255" class="flow-line" stroke="#e05a47" marker-end="url(#arrow)" />
    <text x="215" y="90" class="lbl" fill="#e05a47">mTLS</text>

    <!-- Alice -> Firewall -->
    <path d="M 175,242 L 230,280" class="flow-line" stroke="#3498db" marker-end="url(#arrow)" />
    <text x="200" y="250" class="lbl" fill="#3498db">mTLS+TPM</text>

    <!-- Bob -> Firewall -->
    <path d="M 175,342 L 230,305" class="flow-line" stroke="#3498db" marker-end="url(#arrow)" />
    <text x="200" y="335" class="lbl" fill="#3498db">mTLS</text>

    <!-- Firewall -> Envoy -->
    <path d="M 375,292 L 455,250" class="flow-line" stroke="#e05a47" marker-end="url(#arrow)" />
    <text x="415" y="263" class="lbl" fill="#e05a47">DNAT</text>

    <!-- Envoy -> Web API -->
    <path d="M 605,225 L 710,140" class="flow-line" stroke="#2ecc71" marker-end="url(#arrow)" />
    <text x="655" y="175" class="lbl" fill="#2ecc71">HTTP</text>

    <!-- Web API -> MongoDB -->
    <path d="M 792,155 L 792,275" class="flow-line" stroke="#2ecc71" marker-end="url(#arrow)" />
    <text x="805" y="215" class="lbl" fill="#2ecc71">TCP</text>

    <!-- Firewall -> Snort (DPI) -->
    <path d="M 245,330 L 245,410 L 125,410 L 125,450" class="flow-line" stroke="#8b949e" marker-end="url(#arrow)" />
    <text x="180" y="405" class="lbl" fill="#8b949e">packet mirroring (DPI)</text>

    <!-- Envoy -> OPA (gRPC) -->
    <path d="M 585,285 L 585,385 L 825,385 L 825,450" class="flow-line" stroke="#8b949e" marker-end="url(#arrow)" />
    <text x="705" y="380" class="lbl" fill="#8b949e">verifica authorization (gRPC)</text>

    <!-- OPA -> Splunk (Query Risk) -->
    <path d="M 825,515 L 825,530 L 595,530 L 595,515" class="flow-line" stroke="#8b949e" marker-end="url(#arrow)" />
    <text x="710" y="525" class="lbl" fill="#8b949e">query risk score</text>

    <!-- Telemetrie (Dashed lines to Fluent-Bit) -->
    <!-- Firewall -> Fluent-Bit -->
    <path d="M 330,330 L 330,450" class="telemetry-line" stroke="#8b949e" marker-end="url(#arrow-tel)" />
    <text x="345" y="390" class="lbl" fill="#8b949e" font-size="8">log ulogd2</text>

    <!-- Snort -> Fluent-Bit -->
    <path d="M 195,482 L 285,482" class="telemetry-line" stroke="#8b949e" marker-end="url(#arrow-tel)" />
    <text x="240" y="475" class="lbl" fill="#8b949e" font-size="8">log alert</text>

    <!-- Envoy -> Fluent-Bit -->
    <path d="M 500,285 L 500,410 L 385,410 L 385,450" class="telemetry-line" stroke="#8b949e" marker-end="url(#arrow-tel)" />
    <text x="435" y="405" class="lbl" fill="#8b949e" font-size="8">log accessi</text>

    <!-- MongoDB -> Fluent-Bit -->
    <path d="M 710,330 L 355,330 L 355,450" class="telemetry-line" stroke="#8b949e" marker-end="url(#arrow-tel)" />
    <text x="510" y="325" class="lbl" fill="#8b949e" font-size="8">log transazioni database</text>

    <!-- Fluent-Bit -> Splunk -->
    <path d="M 425,482 L 525,482" class="telemetry-line" stroke="#e6edf3" marker-end="url(#arrow-tel)" />
    <text x="475" y="475" class="lbl" fill="#e6edf3">inoltro log</text>
  </g>
</svg>
