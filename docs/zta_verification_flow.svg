<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Styles for animations -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap');
      
      .bg { fill: #0a0e17; rx: 12px; }
      .text-title { font-family: 'Outfit', -apple-system, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
      .text-subtitle { font-family: 'Outfit', -apple-system, sans-serif; font-size: 11px; fill: #8b949e; }
      .node-text { font-family: 'Outfit', -apple-system, sans-serif; font-size: 12px; font-weight: 600; fill: #e6edf3; text-anchor: middle; }
      .port-text { font-family: 'Outfit', -apple-system, sans-serif; font-size: 9px; fill: #58a6ff; text-anchor: middle; }
      
      /* Pulse Animation */
      @keyframes pulse {
        0% { r: 18px; opacity: 0.8; stroke-width: 1px; }
        50% { r: 28px; opacity: 0.4; stroke-width: 1.5px; }
        100% { r: 38px; opacity: 0; stroke-width: 2px; }
      }
      .ring-green {
        animation: pulse 2.5s infinite;
        stroke: #2ea043;
        fill: none;
      }
      .ring-red {
        animation: pulse 2.5s infinite 1.25s;
        stroke: #f85149;
        fill: none;
      }
      
      /* Shield Glow */
      @keyframes shield-glow {
        0%, 100% { filter: drop-shadow(0px 0px 4px rgba(88, 166, 255, 0.4)); }
        50% { filter: drop-shadow(0px 0px 12px rgba(88, 166, 255, 0.8)); }
      }
      .shield-node {
        animation: shield-glow 3s infinite ease-in-out;
      }
      
      /* Signal Flow Animation */
      @keyframes flow-allow {
        0% { stroke-dashoffset: 240; opacity: 0; }
        10% { opacity: 1; }
        50% { stroke-dashoffset: 120; }
        90% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      
      @keyframes flow-deny {
        0% { stroke-dashoffset: 240; opacity: 0; }
        10% { opacity: 1; }
        50% { stroke-dashoffset: 120; }
        60% { opacity: 1; }
        70% { stroke-dashoffset: 100; opacity: 0; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      
      .path-base {
        stroke: #21262d;
        stroke-width: 3px;
        fill: none;
        stroke-dasharray: 6 4;
      }
      
      .path-green-flow {
        stroke: #3fb950;
        stroke-width: 3px;
        fill: none;
        stroke-dasharray: 40 200;
        animation: flow-allow 4s infinite linear;
      }
      
      .path-red-flow {
        stroke: #f85149;
        stroke-width: 3px;
        fill: none;
        stroke-dasharray: 40 200;
        animation: flow-deny 4s infinite linear;
      }
      
      /* Deny X flashing */
      @keyframes flash-x {
        0%, 45%, 100% { opacity: 0; transform: scale(0.5); transform-origin: 400px 125px; }
        50%, 75% { opacity: 1; transform: scale(1.1); transform-origin: 400px 125px; }
      }
      .deny-cross {
        animation: flash-x 4s infinite ease-in-out;
        fill: #f85149;
      }
    </style>
    
    <!-- Shield Icon path -->
    <g id="shield">
      <path d="M18 2.01s-6.72.63-10.8 4.2C3.12 9.8 3 16.5 3 16.5c0 7.8 8.4 12.3 15 15.49 6.6-3.18 15-7.69 15-15.49 0 0-.12-6.7-4.2-10.29C24.72 2.64 18 2.01 18 2.01z" />
    </g>
    <!-- Server Icon path -->
    <g id="server">
      <rect x="2" y="2" width="32" height="10" rx="1.5" />
      <rect x="2" y="14" width="32" height="10" rx="1.5" />
      <rect x="2" y="26" width="32" height="10" rx="1.5" />
      <circle cx="6" cy="7" r="1" fill="#58a6ff" />
      <circle cx="6" cy="19" r="1" fill="#58a6ff" />
      <circle cx="6" cy="31" r="1" fill="#58a6ff" />
      <line x1="12" y1="7" x2="30" y2="7" stroke-width="1.5" stroke-linecap="round" stroke="#3fb950" />
      <line x1="12" y1="19" x2="30" y2="19" stroke-width="1.5" stroke-linecap="round" stroke="#3fb950" />
      <line x1="12" y1="31" x2="30" y2="31" stroke-width="1.5" stroke-linecap="round" stroke="#3fb950" />
    </g>
    <!-- Cross/X Icon -->
    <g id="cross">
      <circle cx="18" cy="18" r="14" fill="#f85149" stroke="#ffffff" stroke-width="2" />
      <path d="M12 12l12 12M24 12L12 24" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    </g>
  </defs>
  
  <!-- Outer Box -->
  <rect class="bg" width="100%" height="100%" stroke="#30363d" stroke-width="1" />
  
  <!-- Title -->
  <text x="25" y="35" class="text-title">FLUSSO DI VERIFICA DINAMICO (ZTA CONTROLLER)</text>
  <text x="25" y="52" class="text-subtitle">Rilevamento delle minacce e micro-segmentazione adattiva in tempo reale</text>
  
  <!-- Connections / Paths -->
  <!-- Client to Firewall -->
  <path class="path-base" d="M 120,125 L 260,125" />
  <path class="path-green-flow" d="M 120,125 L 260,125" />
  
  <!-- Firewall to Envoy -->
  <path class="path-base" d="M 300,125 L 380,125" />
  <path class="path-green-flow" d="M 300,125 L 380,125" />
  <path class="path-red-flow" d="M 300,125 L 380,125" />
  
  <!-- Envoy to DB (Allowed Path) -->
  <path class="path-base" d="M 420,125 L 680,125" />
  <path class="path-green-flow" d="M 420,125 L 680,125" />
  
  <!-- Pulsing Rings around Envoy -->
  <circle cx="400" cy="125" r="18" class="ring-green" />
  <circle cx="400" cy="125" r="18" class="ring-red" />
  
  <!-- NODES -->
  
  <!-- 1. Client Node -->
  <g transform="translate(80, 105)">
    <circle cx="20" cy="20" r="28" fill="#161b22" stroke="#30363d" stroke-width="2" />
    <g transform="translate(2, 2) scale(1)" stroke="#8b949e" fill="none">
      <!-- Computer Icon -->
      <rect x="6" y="8" width="28" height="18" rx="2" stroke-width="2"/>
      <path d="M12 26h16M20 26v4M15 30h10" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="20" y="65" class="node-text">Clients</text>
    <text x="20" y="77" class="text-subtitle">Alice / Bob / Charlie</text>
  </g>
  
  <!-- 2. Firewall Node -->
  <g transform="translate(260, 105)">
    <circle cx="20" cy="20" r="24" fill="#21262d" stroke="#f0883e" stroke-width="2" />
    <g transform="translate(7, 6) scale(0.7)" stroke="#f0883e" fill="none">
      <!-- Wall/Firewall Icon -->
      <rect x="2" y="2" width="32" height="32" rx="3" stroke-width="2.5"/>
      <path d="M2 10h32M2 20h32M2 30h32M10 2v8M24 2v8M16 10v10M8 20v10M26 20v10" stroke-width="2"/>
    </g>
    <text x="20" y="65" class="node-text">nftables</text>
    <text x="20" y="77" class="text-subtitle">L4 Protection</text>
  </g>
  
  <!-- 3. Envoy/OPA (PEP/PDP) Node -->
  <g class="shield-node" transform="translate(380, 105)">
    <circle cx="20" cy="20" r="28" fill="#1f242c" stroke="#58a6ff" stroke-width="3" />
    <g transform="translate(2, 2) scale(1)" stroke="#58a6ff" fill="#1f242c">
      <use href="#shield" />
    </g>
    <text x="20" y="65" class="node-text">Envoy + OPA</text>
    <text x="20" y="77" class="text-subtitle">PEP / PDP</text>
  </g>
  
  <!-- 4. Secure DB/API Node -->
  <g transform="translate(680, 105)">
    <circle cx="20" cy="20" r="28" fill="#161b22" stroke="#3fb950" stroke-width="2" />
    <g transform="translate(2, 2) scale(1)" stroke="#3fb950" fill="none">
      <use href="#server" />
    </g>
    <text x="20" y="65" class="node-text">Backend Core</text>
    <text x="20" y="77" class="text-subtitle">API &amp; MongoDB</text>
  </g>
  
  <!-- Deny indicator overlay -->
  <g class="deny-cross" transform="translate(382, 107)">
    <use href="#cross" />
  </g>
  
</svg>
